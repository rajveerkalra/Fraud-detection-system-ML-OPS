name: ci

on:
  push:
  pull_request:

jobs:
  demo:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Docker versions
        run: |
          docker --version
          docker compose version

      - name: Run end-to-end demo smoke test
        run: make demo

